version: '3'

tasks:
  run-game:
    desc: Run the graphical Bevy snake game
    cmds:
      - cargo run -p animals_game

  play:
    desc: Play the Snake game manually
    cmds:
      - cargo run -p animals_game

  play-ai:
    desc: "Watch the AI play the Snake game using the trained model (Rust will spawn the Python server automatically). Example: task play-ai -- --snakes 4 --model v1 --model v2"
    cmds:
      - cargo run -p animals_game -- --ai {{.CLI_ARGS}}

  test-ai:
    desc: "Run the simulation purely in python at full speed without bevy, outputting results to json. Example: task test-ai -- --snakes 4 --model v1 --output results.json"
    dir: learner
    cmds:
      - PYTHONPATH=src uv run python -m learner.test {{.CLI_ARGS}}

  train:
    desc: "Train the snake ML model. Usage: task train STEPS=500000"
    dir: learner
    vars:
      STEPS: '{{default "100000" .STEPS}}'
    cmds:
      - PYTHONPATH=src uv run python -m learner.main --steps {{.STEPS}} --preys-per-game 8 --amphibias-per-game 4

  train-prey:
    desc: "Train the prey ML model against a frozen snake model. Usage: task train-prey STEPS=1000000"
    dir: learner
    vars:
      STEPS: '{{default "1000000" .STEPS}}'
    cmds:
      - PYTHONPATH=src uv run python -m learner.train_prey --steps {{.STEPS}}

  train-amphibia:
    desc: "Train the amphibia ML model against a frozen snake model. Usage: task train-amphibia STEPS=1000000"
    dir: learner
    vars:
      STEPS: '{{default "1000000" .STEPS}}'
    cmds:
      - PYTHONPATH=src uv run python -m learner.train_amphibia --steps {{.STEPS}}

  build-sim:
    desc: Build the PyO3 rust code and install into learner venv
    dir: learner
    cmds:
      - PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 uv pip install -e ../animals_simulation

  check:
    desc: Check the Rust workspace compilation
    cmds:
      - PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 cargo check
